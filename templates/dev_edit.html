<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h1 style="color:#e63946;">Developer Portal</h1>
    <h2>Editing Student ID {{ student[3] }}</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    <form method="POST">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" value="{{ student[1] }}" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ student[2] }}" required>
        </div>

        <div class="form-group">
            <label>Level of Study</label>
            <select name="study_level" required>
                {% for level in ['Bachelors', 'Masters', 'PhD', 'Diploma'] %}
                <option value="{{ level }}" {% if student[4] == level %}selected{% endif %}>
                    {{ level }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Country</label>
            <input type="text" name="country" value="{{ student[5] }}" required>
        </div>

        <div class="form-group">
            <label>Course / Program</label>
            <input type="text" name="course" value="{{ student[6] }}" required>
        </div>

        <button type="submit" class="btn dev-btn">Save Changes</button>
        <a href="/dev/dashboard" class="btn" style="background:#6c757d; margin-top:8px;">
            Cancel
        </a>

    </form>
</div>
</body>
</html>
