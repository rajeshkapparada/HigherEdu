<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit College - Developer Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="dev-container">

    <div class="dev-header">
        <div>
            <h1>Developer Panel</h1>
            <p class="dev-sub">Editing College</p>
        </div>
        <a href="/dev/logout" class="btn dev-logout-btn">Logout</a>
    </div>

    <div class="dev-nav">
        <a href="/dev/dashboard">Students</a>
        <a href="/dev/countries">Countries</a>
        <a href="/dev/states">States</a>
        <a href="/dev/cities">Cities</a>
        <a href="/dev/colleges" class="active">Colleges</a>
        <a href="/dev/courses">Courses</a>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    <div class="dev-form-card">
        <h3 class="dev-section-title">Edit College</h3>
        <form method="POST">
            <div class="form-group">
                <label>City</label>
                <select name="city_id" required style="width:100%; padding:10px 14px; border:1px solid #ddd; border-radius:6px; font-size:14px;">
                    {% for c in cities %}
                    <option value="{{ c[0] }}" {% if college[4] == c[0] %}selected{% endif %}>
                        {{ c[3] }} → {{ c[2] }} → {{ c[1] }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>College Name</label>
                <input type="text" name="name" value="{{ college[1] }}" required>
            </div>
            <div class="form-group">
                <label>Website</label>
                <input type="text" name="website" value="{{ college[3] or '' }}">
            </div>
            <div class="form-group">
                <label>World Ranking <small style="color:#999">(optional)</small></label>
                <input type="number" name="ranking" value="{{ college[5] or '' }}" min="1" placeholder="e.g. 45">
            </div>
            <div class="form-group">
                <label>Tuition Fee (USD/yr) <small style="color:#999">(optional)</small></label>
                <input type="number" name="tuition_fee_usd" value="{{ college[6] or '' }}" min="0" placeholder="e.g. 45000">
            </div>
            <div class="form-group">
                <label>Scholarship Info <small style="color:#999">(optional)</small></label>
                <textarea name="scholarship_info" rows="3">{{ college[7] or '' }}</textarea>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="4">{{ college[2] or '' }}</textarea>
            </div>
            <button type="submit" class="btn dev-btn" style="width:auto; padding:10px 28px;">Save Changes</button>
            <a href="/dev/colleges" class="btn" style="background:#6c757d; width:auto; padding:10px 20px; margin-left:8px;">Cancel</a>
        </form>
    </div>

</div>
</body>
</html>
